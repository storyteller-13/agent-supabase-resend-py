# See https://pre-commit.com for usage
# Install: make pre-commit  (or: uv run pre-commit install)
# Run on commit: ruff check --fix + ruff format. Tests run in CI.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
